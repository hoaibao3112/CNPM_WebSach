<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tác phẩm thể loại Hoạt hình</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>

  <!-- API Configuration - LOAD EARLY -->
  <script src="js/config.js"></script>
  <script src="js/api-patcher.js"></script>
</head>

<body class="bg-bg pt-14 font-body antialiased">
    <div id="load-header"></div>

    <!-- Header Section -->
    <header class="bg-white border-b border-border py-12">
        <div class="container max-w-[1300px] mx-auto px-4">
            <div class="flex flex-col md:flex-row items-center justify-center text-center md:text-left gap-6 animate-in fade-in slide-in-from-top-4 duration-700">
                <div class="w-20 h-20 bg-primary-light text-primary rounded-3xl flex items-center justify-center text-3xl shadow-lg shadow-primary/10">
                    <i class="fa-solid fa-film"></i>
                </div>
                <div class="space-y-2">
                    <h1 class="text-4xl md:text-5xl font-black text-gray-800 uppercase tracking-tighter leading-none">Phim <span class="text-primary">& Hoạt Hình</span></h1>
                    <p class="text-sm font-bold text-gray-400 uppercase tracking-widest italic">Khám phá các bộ truyện và tác phẩm hoạt hình nổi bật</p>
                </div>
            </div>
        </div>
    </header>
  
    <!-- Main Content -->
    <main class="container max-w-[1300px] mx-auto px-4 py-12 space-y-20">
        <!-- Banner -->
        <div class="top-banner rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white transform hover:scale-[1.01] transition-transform duration-700">
            <img src="img/giamgia_manga/hinh1.png" alt="Banner Hoạt hình" class="w-full h-auto">
        </div>

        <!-- Voucher Section -->
        <section class="voucher-section space-y-12">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="voucher-banner w-full md:w-1/3 rounded-3xl overflow-hidden shadow-xl border border-border">
                    <img src="img/giamgia_manga/Manga_LDP_Tagname_01.webp" alt="voucher" class="w-full h-auto">
                </div>
                <div id="voucherList" class="voucher-list flex-1 grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- JS will render vouchers here -->
                </div>
            </div>
        </section>

        <!-- Secondary Banner -->
        <div class="deal-banner rounded-3xl overflow-hidden shadow-lg border border-border">
            <img src="img/giamgia_manga/Manga_LDP_Tagname_02.jpg" alt="Lịch săn deal hấp dẫn" class="w-full h-auto">
        </div>

        <!-- Product List -->
        <section class="product-section space-y-10">
            <div class="flex items-center gap-4 border-b border-border pb-4">
                <div class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
                    <i class="fa-solid fa-star text-xs"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">Danh sách sản phẩm</h2>
            </div>
            
            <div id="multi-category-list" class="product-list grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- JS will render products here -->
                <div class="loading col-span-full py-20 text-center space-y-4">
                    <i class="fas fa-spinner fa-spin text-3xl text-primary"></i>
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest animate-pulse">Đang tải sản phẩm...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="load-footer"></div>

    <script src="js/khuyenmai9.js"></script>
    <script src="js/loadHeader.js"></script>
    <script src="js/loadFooter.js"></script>

    <style>
        /* Shared Styles for JS-rendered components */
        .voucher-card {
            @apply bg-white p-6 rounded-2xl border border-border shadow-sm flex flex-col gap-3 relative transition-all hover:shadow-md;
        }
        .voucher-type {
            @apply text-sm font-black text-gray-800 uppercase tracking-tighter;
        }
        .voucher-desc {
            @apply text-xs text-gray-500 italic leading-relaxed line-clamp-2;
        }
        .voucher-hsd {
            @apply text-[10px] font-bold text-gray-400 uppercase tracking-widest;
        }
        .voucher-code {
            @apply text-[10px] font-black text-primary bg-primary-light px-2 py-1 rounded inline-block w-fit;
        }
        .btn-save {
            @apply mt-2 w-full py-2 bg-gray-800 hover:bg-black text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed;
        }
        
        .product-card {
            @apply bg-white rounded-3xl border border-border shadow-sm overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-2 cursor-pointer;
        }
        .product-card img {
            @apply w-full aspect-[3/4] object-cover transition-transform duration-700;
        }
        .product-card:hover img {
            @apply scale-110;
        }
        .card-body {
            @apply p-4 space-y-2;
        }
        .card-body h3 {
            @apply text-sm font-black text-gray-800 uppercase tracking-tighter line-clamp-2 leading-tight;
        }
        .product-author {
            @apply text-[10px] font-bold text-gray-400 uppercase tracking-widest truncate;
        }
        .product-price {
            @apply text-base font-black text-primary tracking-tighter;
        }
    </style>
</body>
</html>
