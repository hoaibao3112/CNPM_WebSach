<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh Sách Tác Giả</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  
    <!-- API Configuration - LOAD EARLY -->
    <script src="js/config.js"></script>
    <script src="js/api-patcher.js"></script>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Tailwind CSS CDN & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
</head>

<body class="bg-bg pt-14 font-body antialiased">
    <div id="load-header"></div>

    <!-- Breadcrumb Navigation -->
    <nav class="navi container max-w-[1300px] mx-auto px-4 py-6">
        <div class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-gray-400">
            <a href="index.html" class="hover:text-primary transition-colors">TRANG CHỦ</a>
            <span class="text-gray-200">/</span>
            <span class="text-primary">TÁC GIẢ</span>
        </div>
    </nav>
    
    <div class="wrapper container max-w-[1300px] mx-auto px-4 pb-20">
        <header class="page-head bg-white p-8 rounded-3xl border border-border shadow-sm mb-8 space-y-8">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <div class="page-icon w-20 h-20 rounded-2xl overflow-hidden shadow-inner border border-gray-100 flex-shrink-0">
                    <img src="img/author/icon.jpg" alt="Danh sách tác giả" class="w-full h-full object-cover">
                </div>
                <div class="page-title text-center md:text-left space-y-1">
                    <h1 class="text-3xl font-black text-gray-800 uppercase tracking-tighter">Danh Sách Tác Giả</h1>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest italic">Khám phá những người truyền cảm hứng qua từng trang sách</p>
                </div>
            </div>

            <div class="controls flex flex-col md:flex-row md:items-center justify-between gap-6 pt-8 border-t border-gray-50">
                <div class="relative flex-1 max-w-md">
                    <input type="text" id="search-input-author" placeholder="Tìm kiếm tác giả..." class="w-full pl-12 pr-6 py-3.5 bg-gray-50 border border-border rounded-2xl outline-none focus:border-primary transition-all text-sm font-bold text-gray-600">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                </div>
                <div class="pagination flex items-center gap-3">
                    <button id="prev-page" class="w-10 h-10 flex items-center justify-center bg-white border-2 border-gray-100 hover:border-gray-200 text-gray-400 rounded-xl transition-all disabled:opacity-30 disabled:cursor-not-allowed" disabled>
                        <i class="fas fa-chevron-left text-xs"></i>
                    </button>
                    <span id="page-info" class="text-xs font-black text-gray-400 uppercase tracking-widest min-w-[100px] text-center">Trang 1 / 1</span>
                    <button id="next-page" class="w-10 h-10 flex items-center justify-center bg-white border-2 border-gray-100 hover:border-gray-200 text-gray-400 rounded-xl transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="author-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="author-list">
            <div class="loading col-span-full py-20 text-center space-y-4">
                <i class="fas fa-spinner fa-spin text-3xl text-primary"></i>
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest animate-pulse">Đang tải danh sách tác giả...</p>
            </div>
        </main>
    </div>

    <!-- Modal for Author Details -->
    <div id="author-modal" class="modal fixed inset-0 bg-black/60 backdrop-blur-sm z-[1100] hidden items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-3xl max-h-[90vh] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col relative animate-in fade-in zoom-in duration-300">
            <button class="close absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-red-50 text-gray-400 hover:text-red-500 rounded-full transition-all z-10 text-xl font-bold" aria-label="Đóng">×</button>

            <div class="overflow-y-auto flex-1">
                <div class="modal-top p-8 md:p-12 bg-gray-50 flex flex-col md:flex-row items-center gap-8 border-b border-border">
                    <div class="avatar-wrap w-40 h-40 rounded-full overflow-hidden shadow-2xl border-4 border-white flex-shrink-0">
                        <img id="modal-author-image" src="img/author/icon.jpg" alt="Tác giả" class="w-full h-full object-cover">
                    </div>
                    <div class="modal-heading text-center md:text-left space-y-4">
                        <h2 id="modal-author-name" class="text-3xl font-black text-gray-800 uppercase tracking-tighter leading-none"></h2>
                        <div class="meta flex flex-wrap justify-center md:justify-start gap-6">
                            <div class="space-y-1">
                                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block">Ngày sinh</span>
                                <span id="modal-author-birthday" class="text-sm font-bold text-gray-600">Không rõ</span>
                            </div>
                            <div class="space-y-1 border-l border-gray-200 pl-6">
                                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest block">Quốc tịch</span>
                                <span id="modal-author-nationality" class="text-sm font-bold text-gray-600">Không rõ</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-8 md:p-12 space-y-12">
                    <div class="modal-bio space-y-4">
                        <h3 class="text-xs font-black text-primary uppercase tracking-[0.2em] border-b border-primary-light pb-2 inline-block">Tiểu sử tác giả</h3>
                        <p id="modal-author-bio" class="text-sm text-gray-600 leading-relaxed italic"></p>
                    </div>

                    <div class="book-section space-y-6">
                        <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] border-b border-gray-100 pb-2 flex items-center justify-between">
                            <span>Tác phẩm nổi bật</span>
                            <span class="text-[9px] lowercase italic text-gray-300">Scroll to explore &bull;</span>
                        </h3>
                        <div class="books-wrapper relative group">
                            <button class="scroll-btn left absolute -left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white shadow-lg border border-border rounded-full flex items-center justify-center text-gray-400 hover:text-primary hover:scale-110 opacity-0 group-hover:opacity-100 transition-all z-10" aria-label="Lùi">
                                <i class="fas fa-chevron-left text-xs"></i>
                            </button>
                            <div class="books flex gap-4 overflow-x-auto pb-6 scrollbar-hide snap-x" id="modal-author-products">
                                <!-- JS will render book cards here -->
                            </div>
                            <button class="scroll-btn right absolute -right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white shadow-lg border border-border rounded-full flex items-center justify-center text-gray-400 hover:text-primary hover:scale-110 opacity-0 group-hover:opacity-100 transition-all z-10" aria-label="Tiến">
                                <i class="fas fa-chevron-right text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script src="js/author.js"></script>
    <script src="js/loadHeader.js"></script>
</body>
</html>
