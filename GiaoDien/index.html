<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang Chủ | Bookstore</title>
  <!-- Google Fonts: Playfair Display + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- AOS — Animate On Scroll -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>

  <!-- API Configuration - LOAD EARLY -->
  <script src="js/config.js"></script>
  <script src="js/api-patcher.js"></script>

  <style>
    /* Prevent horizontal overflow on mobile */
    html,
    body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    /* Standardized no-scrollbar utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-bg pt-14 md:pt-16 font-body antialiased">
  <!-- Top bar -->
  <div id="load-header"></div>

  <!-- Slideshow -->
  <div
    class="grid-slideshow grid grid-cols-1 md:grid-cols-3 md:grid-rows-2 gap-2 md:gap-3 w-[94%] md:w-[92%] mx-auto my-4 rounded-xl md:rounded-2xl overflow-hidden shadow-sm">
    <div class="slide-large md:col-span-2 md:row-span-2 h-[180px] sm:h-[260px] md:h-[420px] overflow-hidden">
      <img src="img/anhnen/17d.jpg" alt="Slide lớn"
        class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
    <div class="slide-small h-[80px] sm:h-[120px] md:h-[200px] overflow-hidden">
      <img src="img/anhnen/18d.jpg" alt="Slide nhỏ 1"
        class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
    <div class="slide-small h-[80px] sm:h-[120px] md:h-[200px] overflow-hidden">
      <img src="img/anhnen/14d.jpg" alt="Slide nhỏ 2"
        class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
  </div>

  <!-- Promotion Cards -->
  <div
    class="promo-bar-container w-[94%] md:w-[92%] mx-auto mt-4 md:mt-10 bg-white p-3 md:p-7 rounded-2xl md:rounded-[2.5rem] border border-border flex justify-start md:justify-center items-center gap-4 md:gap-10 overflow-x-auto no-scrollbar shadow-md">
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia1.html'">
      <img src="img/giamgia/anh1.jpg" alt="Mã giảm giá"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Ưu đãi</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia1.html'">
      <img src="img/giamgia/anh2.jpg" alt="Flash Sale"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Flash Sale</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia2.html'">
      <img src="img/giamgia/anh3.jpg" alt="Đinh Tị Books"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Đinh Tị</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia5.html'">
      <img src="img/giamgia/anh4.jpg" alt="Alpha Books"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Alpha</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia3.html'">
      <img src="img/giamgia/anh5.jpg" alt="Phiếu giảm giá"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Voucher</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./giamgia4.html'">
      <img src="img/giamgia/anh6.jpg" alt="Sản phẩm mới"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Mới nhất</p>
    </div>
    <div
      class="promo-card flex-shrink-0 w-20 md:w-24 text-center cursor-pointer transition-all hover:-translate-y-1.5 hover:scale-105"
      onclick="window.location.href='./khuyenmai9.html'">
      <img src="img/giamgia/anh9.jpg" alt="Truyện tranh"
        class="w-12 h-12 md:w-16 md:h-16 mx-auto rounded-full object-cover shadow-md mb-2.5 border-2 border-white ring-1 ring-primary/5">
      <p class="text-[9px] md:text-xs font-black text-text uppercase tracking-tight">Truyện</p>
    </div>
  </div>

  <!-- Flash Sale Section -->
  <div id="flash-sale"
    class="flash-sale-container w-[94%] md:w-[92%] mx-auto mt-6 md:mt-8 bg-white rounded-xl md:rounded-2xl border border-border overflow-hidden shadow-sm">
    <div
      class="flash-sale-header flex justify-between items-center p-3 md:p-4 bg-gradient-to-r from-primary to-[#e74c3c] text-white">
      <div class="flash-sale-left flex items-center gap-2 md:gap-4">
        <h2 class="font-display text-lg md:text-xl font-black tracking-tight italic">FLASH SALE</h2>
        <div id="flash-countdown" class="countdown"> </div>
      </div>
      <button id="flash-view-all"
        class="view-all-btn text-[10px] md:text-xs font-black uppercase tracking-widest bg-white/10 hover:bg-white text-white hover:text-primary px-4 md:px-6 py-2 md:py-2.5 rounded-lg md:rounded-xl transition-all border border-white/20 shadow-sm active:scale-95">Tất
        cả</button>
    </div>

    <div id="flash-products" class="flash-products">
      <!-- Dữ liệu được inject từ products_sales.js -->
    </div>
  </div>

  <!-- Main Content -->
  <div class="container max-w-[1300px] mx-auto px-2 sm:px-4 mt-6 md:mt-8 flex flex-col md:flex-row gap-6">
    <main class="main-content flex-1 bg-white p-4 md:p-8 rounded-xl md:rounded-[32px] border border-border shadow-sm">
      <div id="recommend-widget-container" class="mb-8"></div>

      <!-- Component: Có thể bạn thích -->
      <div id="personalized-recommendations" class="mb-10"></div>

      <!-- Section: Sách Mới -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Mới
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
          <!-- <a href="book.html" class="text-sm font-bold text-primary hover:underline">Xem tất cả <i class="fas fa-chevron-right ml-1"></i></a> -->
        </div>
        <div id="book-list"
          class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>

      <!-- Section: Sách Giáo Khoa -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Giáo Khoa
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
        </div>
        <div id="textbook-list"
          class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>

      <!-- Section: Sách Khoa Học -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Khoa Học
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
        </div>
        <div id="science-book-list"
          class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>
    </main>
  </div>

  <!-- Footer will be loaded from components/footer.html -->
  <div id="load-footer"></div>


  <script>
    // Load footer partial and inject into the page
    (function () {
      fetch('components/footer.html')
        .then(function (res) { return res.text(); })
        .then(function (html) {
          document.getElementById('load-footer').innerHTML = html;
          // Notify other scripts that footer (and chat HTML) has been loaded
          try { window.dispatchEvent(new Event('footerLoaded')); } catch (e) { /* old browsers */ }
        })
        .catch(function (err) {
          console.error('Failed to load footer:', err);
        });
    })();
  </script>
  <script src="js/customerActivity.js"></script>
  <script src="js/loadHeader.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/index.js"></script>
  <script src="js/book.js"></script>
  <script src="js/products_sales.js"></script>
  <script src="js/recommend-widget.js"></script>
  <script src="js/preference-widget.js"></script>
  <script src="js/personalized-recommendations.js"></script>
  <script src="js/chatbot.js"></script>
  <!-- AOS Init -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init({
      duration: 600,
      easing: 'ease-out-cubic',
      once: true,
      offset: 60
    });
  </script>
  <!-- Floating Right Toolbar (Giống Fahasa) -->
  <div class="fixed right-0 top-1/2 -translate-y-1/2 z-[60] flex flex-col bg-[#777e80] shadow-lg rounded-l-lg overflow-hidden border border-r-0 border-white/20">
    <!-- Nút Like -->
    <button onclick="openRandomBooksModal('Gợi Ý Sách Hay', 'fas fa-thumbs-up')" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center hover:bg-black/20 transition-colors group relative">
      <div class="w-7 h-7 md:w-8 md:h-8 bg-white rounded flex items-center justify-center">
        <i class="fas fa-thumbs-up text-gray-600 md:text-lg"></i>
      </div>
      <!-- Tooltip -->
      <span class="absolute right-full mr-2 md:mr-3 top-1/2 -translate-y-1/2 px-2 py-1 md:px-3 md:py-1.5 bg-gray-800 text-white text-[10px] md:text-xs font-bold whitespace-nowrap rounded-md opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity hidden sm:block">
        Gợi ý sách hay
        <span class="absolute left-full top-1/2 -translate-y-1/2 border-[4px] border-transparent border-l-gray-800"></span>
      </span>
    </button>
    <div class="w-full h-px bg-white/20"></div>
    <!-- Nút Đọc Sách -->
    <button onclick="openRandomBooksModal('Sách Đáng Đọc', 'fas fa-book-open')" class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center hover:bg-black/20 transition-colors group relative">
      <div class="w-7 h-7 md:w-8 md:h-8 bg-white rounded flex items-center justify-center">
        <i class="fas fa-book-open text-gray-600 md:text-lg"></i>
      </div>
      <!-- Tooltip -->
      <span class="absolute right-full mr-2 md:mr-3 top-1/2 -translate-y-1/2 px-2 py-1 md:px-3 md:py-1.5 bg-gray-800 text-white text-[10px] md:text-xs font-bold whitespace-nowrap rounded-md opacity-0 pointer-events-none group-hover:opacity-100 transition-opacity hidden sm:block">
        Sách đáng đọc
        <span class="absolute left-full top-1/2 -translate-y-1/2 border-[4px] border-transparent border-l-gray-800"></span>
      </span>
    </button>
  </div>

  <!-- Right Drawer (Thay cho Modal ở giữa) -->
  <!-- Backdrop -->
  <div id="randomBooksBackdrop" onclick="closeRandomBooksModal()" class="fixed inset-0 bg-black/40 z-[70] hidden opacity-0 transition-opacity duration-300"></div>
  
  <!-- Drawer Content -->
  <div id="randomBooksModal" class="fixed top-0 right-0 h-full w-[85%] sm:w-[400px] md:w-[450px] bg-white z-[80] translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    <!-- Header -->
    <div class="p-4 md:p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 md:w-10 md:h-10 bg-primary/10 text-primary rounded-xl flex items-center justify-center">
          <i id="modalIcon" class="fas fa-star md:text-lg"></i>
        </div>
        <div>
          <h2 id="modalTitle" class="text-base md:text-lg font-black text-gray-800 tracking-tight">Gợi Ý Ngẫu Nhiên</h2>
          <p class="text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">10 Tựa Sách Khám Phá Hôm Nay</p>
        </div>
      </div>
      <button onclick="closeRandomBooksModal()" class="w-8 h-8 bg-white border border-gray-200 text-gray-500 rounded-lg hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all flex items-center justify-center shrink-0">
        <i class="fas fa-times"></i>
      </button>
    </div>
    
    <!-- Body (Scrollable) -->
    <div class="p-4 md:p-5 overflow-y-auto flex-1 bg-white custom-scrollbar">
      <div id="randomBooksGrid" class="flex flex-col gap-4">
        <!-- Loading state -->
        <div class="py-12 flex flex-col items-center justify-center text-primary gap-3">
          <i class="fas fa-spinner fa-spin text-2xl md:text-3xl"></i>
          <p class="text-[10px] font-bold uppercase tracking-widest">Đang tải sách...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/random-books.js"></script>
</body>

</html>
