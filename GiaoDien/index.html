<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang Chủ | Bookstore</title>
  <!-- Google Fonts: Playfair Display + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- AOS — Animate On Scroll -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  
  <!-- API Configuration - LOAD EARLY -->
  <script src="js/config.js"></script>
  <script src="js/api-patcher.js"></script>
</head>

<body class="bg-bg pt-14 md:pt-16 font-body antialiased">
  <!-- Top bar -->
  <div id="load-header"></div>

  <!-- Slideshow -->
  <div class="grid-slideshow grid grid-cols-1 md:grid-cols-3 grid-rows-2 gap-2 md:gap-3 w-[94%] md:w-[92%] mx-auto my-4 rounded-xl md:rounded-2xl overflow-hidden shadow-sm">
    <div class="slide-large md:col-span-2 md:row-span-2 h-[220px] sm:h-[300px] md:h-[420px] overflow-hidden">
      <img src="img/anhnen/17d.jpg" alt="Slide lớn" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
    <div class="slide-small h-[100px] sm:h-[140px] md:h-[200px] overflow-hidden">
      <img src="img/anhnen/18d.jpg" alt="Slide nhỏ 1" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
    <div class="slide-small h-[100px] sm:h-[140px] md:h-[200px] overflow-hidden">
      <img src="img/anhnen/14d.jpg" alt="Slide nhỏ 2" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
    </div>
  </div>

  <!-- Promotion Cards -->
  <div class="promotion-cards flex gap-2 md:gap-4 overflow-x-auto p-3 md:p-5 w-[94%] md:w-[92%] mx-auto bg-white rounded-xl md:rounded-2xl border border-border shadow-sm scrollbar-hide">
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia.html'">
      <img src="img/giamgia/anh1.jpg" alt="Deal riêng 50%" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Ưu đãi</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia1.html'">
      <img src="img/giamgia/anh2.jpg" alt="Flash Sale" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Flash Sale</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia2.html'">
      <img src="img/giamgia/anh3.jpg" alt="Đinh Tị Books" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Đinh Tị</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia5.html'">
      <img src="img/giamgia/anh4.jpg" alt="Alpha Books" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Alpha</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia3.html'">
      <img src="img/giamgia/anh5.jpg" alt="Phiếu giảm giá" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Voucher</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./giamgia4.html'">
      <img src="img/giamgia/anh6.jpg" alt="Sản phẩm mới" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Mới nhất</p>
    </div>
    <div class="promo-card flex-shrink-0 w-16 md:w-20 text-center cursor-pointer transition-transform hover:-translate-y-1" onclick="window.location.href='./khuyenmai9.html'">
      <img src="img/giamgia/anh9.jpg" alt="Truyện tranh" class="w-10 h-10 md:w-12 md:h-12 mx-auto rounded-full object-cover shadow-sm mb-2">
      <p class="text-[9px] md:text-[10px] font-bold text-text-muted leading-tight uppercase tracking-tighter">Truyện</p>
    </div>
  </div>

  <!-- Flash Sale Section -->
  <div id="flash-sale" class="flash-sale-container w-[94%] md:w-[92%] mx-auto mt-6 md:mt-8 bg-white rounded-xl md:rounded-2xl border border-border overflow-hidden shadow-sm">
    <div class="flash-sale-header flex justify-between items-center p-3 md:p-4 bg-gradient-to-r from-primary to-[#e74c3c] text-white">
      <div class="flash-sale-left flex items-center gap-2 md:gap-4">
        <h2 class="font-display text-lg md:text-xl font-black tracking-tight italic">FLASH SALE</h2>
        <div id="flash-countdown" class="countdown"> </div>
      </div>
      <button id="flash-view-all" class="view-all-btn text-[10px] md:text-xs font-black uppercase tracking-widest bg-white/10 hover:bg-white text-white hover:text-primary px-4 md:px-6 py-2 md:py-2.5 rounded-lg md:rounded-xl transition-all border border-white/20 shadow-sm active:scale-95">Tất cả</button>
    </div>

    <div id="flash-products" class="flash-products">
      <!-- Dữ liệu được inject từ products_sales.js -->
    </div>
  </div>

  <!-- Main Content -->
  <div class="container max-w-[1300px] mx-auto px-2 sm:px-4 mt-6 md:mt-8 flex flex-col md:flex-row gap-6">
    <main class="main-content flex-1 bg-white p-4 md:p-8 rounded-xl md:rounded-[32px] border border-border shadow-sm">
      <div id="recommend-widget-container" class="mb-8"></div>

      <!-- Component: Có thể bạn thích -->
      <div id="personalized-recommendations" class="mb-10"></div>

      <!-- Section: Sách Mới -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Mới
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
          <!-- <a href="book.html" class="text-sm font-bold text-primary hover:underline">Xem tất cả <i class="fas fa-chevron-right ml-1"></i></a> -->
        </div>
        <div id="book-list" class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>

      <!-- Section: Sách Giáo Khoa -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Giáo Khoa
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
        </div>
        <div id="textbook-list" class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>

      <!-- Section: Sách Khoa Học -->
      <div class="product-section mb-12">
        <div class="flex justify-between items-end mb-6 border-b border-border pb-3">
          <h2 class="font-display text-2xl font-bold text-gray-800 relative">
            Sách Khoa Học
            <span class="absolute bottom-[-13px] left-0 w-12 h-1 bg-primary rounded-full"></span>
          </h2>
        </div>
        <div id="science-book-list" class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
      </div>
    </main>
  </div>

  <!-- Footer will be loaded from components/footer.html -->
  <div id="load-footer"></div>


  <script>
    // Load footer partial and inject into the page
    (function () {
      fetch('components/footer.html')
        .then(function (res) { return res.text(); })
        .then(function (html) {
          document.getElementById('load-footer').innerHTML = html;
          // Notify other scripts that footer (and chat HTML) has been loaded
          try { window.dispatchEvent(new Event('footerLoaded')); } catch (e) { /* old browsers */ }
        })
        .catch(function (err) {
          console.error('Failed to load footer:', err);
        });
    })();
  </script>
  <script src="js/customerActivity.js"></script>
  <script src="js/loadHeader.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/index.js"></script>
  <script src="js/book.js"></script>
  <script src="js/products_sales.js"></script>
  <script src="js/recommend-widget.js"></script>
  <script src="js/preference-widget.js"></script>
  <script src="js/personalized-recommendations.js"></script>
  <script src="js/chatbot.js"></script>
  <!-- AOS Init -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init({
      duration: 600,
      easing: 'ease-out-cubic',
      once: true,
      offset: 60
    });
  </script>
</body>

</html>
