<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ưu Đãi Ngành Hàng Gấp Bội</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />

  <!-- Tailwind CSS CDN & Config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>

  <!-- API Configuration - LOAD EARLY -->
  <script src="js/config.js"></script>
  <script src="js/api-patcher.js"></script>
</head>

<body class="bg-bg pt-14 font-body antialiased">
    <div id="load-header"></div>

    <main class="container max-w-[1300px] mx-auto px-4 py-8 space-y-12">
        <!-- Top Banner -->
        <div class="top-banner rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white transform hover:scale-[1.01] transition-transform duration-700">
            <img src="img/anhnen3/anh1.png" alt="5 tầng ưu đãi" class="w-full h-auto">
        </div>

        <!-- Inner Banner -->
        <div class="inner-banner rounded-3xl overflow-hidden shadow-lg border border-border">
            <img src="img/anhnen3/anh2.png" alt="Ưu đãi ngành hàng gấp bội" class="w-full h-auto">
        </div>

        <!-- Voucher List -->
        <div class="voucher-list grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="voucherList">
            <!-- Content loaded from API via giamgia3.js -->
        </div>

        <!-- Recommend widget mount point -->
        <div id="recommend-widget-container" class="pt-20 border-t border-border"></div>

        <!-- Partner Banner -->
        <div class="inner-banner rounded-3xl overflow-hidden shadow-lg border border-border">
            <img src="img/anhnen3/anh3.png" alt="Ưu đãi đối tác" class="w-full h-auto">
        </div>

        <!-- Sliders Wrapper -->
        <div class="two-banner-wrapper relative grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Slider bên trái -->
            <div class="slider left-slider relative aspect-[16/9] rounded-3xl overflow-hidden shadow-xl border border-border group">
                <div class="slides flex w-full h-full transition-transform duration-700 ease-in-out">
                    <img src="img/anhnen3/slide1.jpg" alt="Ảnh 1" class="w-full h-full object-cover flex-shrink-0">
                    <img src="img/anhnen3/slide2.jpg" alt="Ảnh 2" class="w-full h-full object-cover flex-shrink-0">
                    <img src="img/anhnen3/slide3.png" alt="Ảnh 3" class="w-full h-full object-cover flex-shrink-0">
                </div>
            </div>

            <!-- Slider bên phải -->
            <div class="slider right-slider relative aspect-[16/9] rounded-3xl overflow-hidden shadow-xl border border-border group">
                <div class="slides flex w-full h-full transition-transform duration-700 ease-in-out">
                    <img src="img/anhnen3/slide4.png" alt="Ảnh 4" class="w-full h-full object-cover flex-shrink-0">
                    <img src="img/anhnen3/slide5.png" alt="Ảnh 5" class="w-full h-full object-cover flex-shrink-0">
                    <img src="img/anhnen3/slide6.png" alt="Ảnh 6" class="w-full h-full object-cover flex-shrink-0">
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="absolute inset-0 flex items-center justify-between px-4 pointer-events-none">
                <button class="prev w-12 h-12 bg-white/90 backdrop-blur-sm border border-border rounded-full flex items-center justify-center text-gray-800 shadow-xl hover:bg-white hover:scale-110 transition-all pointer-events-auto">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="next w-12 h-12 bg-white/90 backdrop-blur-sm border border-border rounded-full flex items-center justify-center text-gray-800 shadow-xl hover:bg-white hover:scale-110 transition-all pointer-events-auto">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </main>

    <div id="load-footer"></div>

    <script src="js/giamgia3.js"></script>
    <script src="js/loadHeader.js"></script>
    <script src="js/loadFooter.js"></script>
    <script src="js/recommend-widget.js"></script>

    <style>
        :root {
            --primary: #B03A2E;
            --primary-light: #fff5f5;
            --secondary: #2C3E50;
            --accent: #E67E22;
            --bg: #f7f3f0;
            --border: #ede8e3;
            --text: #1a1a1a;
            --text-light: #666666;
        }

        /* Voucher Card Premium Styling */
        .voucher-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 180px;
            border: 1px solid var(--border);
        }

        .voucher-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(176, 58, 46, 0.12);
            border-color: rgba(176, 58, 46, 0.3);
        }

        /* Ticket Cut Effect */
        .voucher-card::before, .voucher-card::after {
            content: '';
            position: absolute;
            left: 100px;
            width: 20px;
            height: 20px;
            background: var(--bg);
            border-radius: 50%;
            z-index: 10;
        }
        .voucher-card::before { top: -10px; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.05); }
        .voucher-card::after { bottom: -10px; box-shadow: inset 0 3px 5px rgba(0,0,0,0.05); }

        .voucher-left {
            width: 110px;
            background: linear-gradient(135deg, var(--primary) 0%, #8E2920 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            position: relative;
            flex-shrink: 0;
            border-right: 2px dashed rgba(255,255,255,0.3);
        }

        .voucher-left .icon-wrapper {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-blur: 5px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .voucher-left .label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.9;
        }

        .voucher-right {
            flex: 1;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: white;
        }

        .voucher-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .voucher-desc {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .voucher-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .voucher-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .voucher-code-display {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
        }

        .voucher-expiry-text {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .voucher-btns {
            display: flex;
            gap: 10px;
        }

        .btn-claim {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(176, 58, 46, 0.2);
        }

        .btn-claim:hover:not(:disabled) {
            background: #8E2920;
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(176, 58, 46, 0.3);
        }

        .btn-claim:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-claim.saved {
            background: #10b981;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-detail {
            width: 38px;
            height: 38px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            transition: all 0.3s;
        }

        .btn-detail:hover {
            background: white;
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: fadeInUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</body>
</html>
