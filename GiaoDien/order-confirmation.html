<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết quả thanh toán | Trung Phong Books</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2);   opacity: 0; }
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .animate-fade-up   { animation: fadeInUp 0.6s ease both; }
    .animate-scale-in  { animation: scaleIn 0.5s cubic-bezier(.175,.885,.32,1.275) both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }

    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      top: -20px;
      animation: confetti-fall linear forwards;
      border-radius: 2px;
      z-index: 0;
      pointer-events: none;
    }

    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.15;
      animation: pulse-ring 1.5s ease-out infinite;
    }

    .detail-card {
      background: #fff;
      border-radius: 20px;
      border: 1.5px solid #f0ebe5;
      overflow: hidden;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #f7f4f1;
      font-size: 13px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .lbl { 
      color: #888; 
      font-weight: 700; 
      text-transform: uppercase; 
      font-size: 10px; 
      letter-spacing: 0.025em;
    }
    .detail-row .val { font-weight: 700; color: #222; text-align: right; }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
    }
    .step-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
    }

    /* Spinner */
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#fdf8f5] via-[#fff] to-[#f5f0ff] flex flex-col items-center justify-start py-8 px-4 relative overflow-x-hidden">

  <!-- Confetti container -->
  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-0"></div>

  <!-- Main container -->
  <div class="relative z-10 w-full max-w-5xl px-2 sm:px-6">

    <!-- Loading state -->
    <div id="loading-state" class="max-w-lg mx-auto bg-white rounded-[32px] shadow-2xl border border-border p-10 text-center space-y-6">
      <div class="w-20 h-20 mx-auto bg-primary/10 rounded-full flex items-center justify-center">
        <i class="fas fa-circle-notch spin text-3xl text-primary"></i>
      </div>
      <div>
        <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight">Đang xử lý</h2>
        <p class="text-sm text-gray-400 mt-1">Vui lòng chờ trong giây lát...</p>
      </div>
    </div>

    <!-- Result state -->
    <div id="result-state" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
      
      <!-- Header Hero (Above columns) -->
      <div class="lg:col-span-12 bg-white rounded-[32px] border border-border p-6 text-center space-y-3 mb-2 shadow-sm">
        <div id="status-icon-wrap" class="w-16 h-16 mx-auto rounded-full flex items-center justify-center pulse-ring">
          <i id="status-icon" class="text-2xl"></i>
        </div>
        <div class="space-y-1">
          <h1 id="status-title" class="text-2xl font-display font-black tracking-tight"></h1>
          <p id="status-subtitle" class="text-gray-500 text-sm font-medium"></p>
        </div>
      </div>
      
      <!-- LEFT COLUMN: Info -->
      <div class="lg:col-span-7 space-y-4">

        <!-- Order details -->
        <div id="order-card" class="detail-card animate-fade-up hidden">
          <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
            <i class="fas fa-file-invoice text-primary text-[10px]"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-600">Thông tin đơn hàng</span>
          </div>
          <div id="order-rows"></div>
        </div>

        <!-- Customer Info -->
        <div id="customer-card" class="detail-card animate-fade-up hidden">
          <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
            <i class="fas fa-user text-primary text-[10px]"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-600">Thông tin nhận hàng</span>
          </div>
          <div id="customer-rows"></div>
        </div>

        <!-- COD steps -->
        <div id="cod-card" class="detail-card animate-fade-up hidden">
          <div class="px-4 py-2.5 bg-emerald-50 border-b border-emerald-100 flex items-center gap-2">
            <i class="fas fa-truck text-emerald-600 text-[10px]"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-emerald-700">Hướng dẫn COD</span>
          </div>
          <div class="p-4 space-y-2">
            <div class="step-item py-1">
              <div class="step-icon w-8 h-8 bg-emerald-50 text-emerald-600 text-xs"><i class="fas fa-phone"></i></div>
              <div class="pt-0.5"><p class="text-xs font-bold text-gray-800">Xác nhận</p><p class="text-[10px] text-gray-500 line-clamp-1">Chúng tôi sẽ gọi xác nhận trong 24h</p></div>
            </div>
            <div class="step-item py-1">
              <div class="step-icon w-8 h-8 bg-blue-50 text-blue-600 text-xs"><i class="fas fa-box"></i></div>
              <div class="pt-0.5"><p class="text-xs font-bold text-gray-800">Giao hàng</p><p class="text-[10px] text-gray-500 line-clamp-1">Thời gian: 2–3 ngày làm việc</p></div>
            </div>
          </div>
        </div>

        <!-- Desktop Action Buttons -->
        <div id="action-btns" class="hidden lg:block space-y-3 animate-fade-up delay-4"></div>
      </div>

      <!-- RIGHT COLUMN: Payment & Products -->
      <div class="lg:col-span-5 space-y-6">
        <!-- Total Highlight -->
        <div id="total-highlight" class="hidden bg-gradient-to-r from-primary to-rose-700 rounded-3xl p-5 text-white shadow-lg animate-fade-up">
          <p class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-1">Tổng cộng</p>
          <p id="total-amount-big" class="text-3xl font-black tracking-tighter"></p>
        </div>

        <!-- Price breakdown -->
        <div id="price-card" class="detail-card animate-fade-up delay-2 hidden">
          <div class="px-5 py-4 bg-gray-50 border-b border-gray-100 flex items-center gap-3">
            <i class="fas fa-calculator text-primary text-sm"></i>
            <span class="text-xs font-black uppercase tracking-widest text-gray-600">Chi tiết thanh toán</span>
          </div>
          <div id="price-rows"></div>
        </div>

        <!-- Product list -->
        <div id="product-card" class="detail-card animate-fade-up hidden">
          <div class="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
            <i class="fas fa-box text-primary text-[10px]"></i>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-600">Sản phẩm</span>
          </div>
          <div id="product-list" class="divide-y divide-gray-50 max-h-[300px] overflow-y-auto"></div>
        </div>

        <!-- Error Card -->
        <div id="error-card" class="detail-card animate-fade-up delay-2 hidden">
          <div class="px-5 py-4 bg-red-50 border-b border-red-100 flex items-center gap-3">
            <i class="fas fa-exclamation-triangle text-red-500 text-sm"></i>
            <span class="text-xs font-black uppercase tracking-widest text-red-600">Chi tiết lỗi</span>
          </div>
          <div id="error-rows"></div>
        </div>

        <!-- Mobile Action Buttons -->
        <div id="action-btns-mobile" class="lg:hidden space-y-3 animate-fade-up delay-4"></div>

        <!-- Trust bar -->
        <div class="animate-fade-up delay-5 flex items-center justify-center gap-2 text-xs text-gray-400 font-semibold pt-4">
          <i class="fas fa-shield-alt text-primary/60"></i>
          Giao dịch được mã hóa & bảo mật 100%
        </div>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api-patcher.js"></script>
  <script>
    function formatPrice(p) {
      if (!p && p !== 0) return '0đ';
      return parseInt(p).toLocaleString('vi-VN') + 'đ';
    }

    function row(label, value, cls = '') {
      return `<div class="detail-row"><span class="lbl">${label}</span><span class="val ${cls}">${value}</span></div>`;
    }

    function isLoggedIn() {
      return !!(document.cookie.split('; ').find(r => r.startsWith('token='))?.split('=')[1]);
    }

    async function loadOrderDetails(orderId) {
      if (!orderId) return null;
      try {
        // Try direct invoice endpoint (if exists)
        let r = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/hoadon/${orderId}`);
        if (!r.ok) {
          // Try standard order details endpoint
          r = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/${orderId}`);
        }
        
        if (r.ok) {
          const json = await r.json();
          return json.data || json;
        }

        // Fallback for logged in users if public endpoints fail
        if (isLoggedIn()) {
          const token = document.cookie.split('; ').find(r => r.startsWith('token='))?.split('=')[1];
          const r2 = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/customer-orders/detail/${orderId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (r2.ok) {
            const json2 = await r2.json();
            return json2.data || json2;
          }
        }
      } catch(e) { console.error('Error loading order details:', e); }
      return null;
    }

    function spawnConfetti() {
      const colors = ['#B03A2E','#f59e0b','#10b981','#3b82f6','#8b5cf6','#f97316'];
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = (Math.random() * 1.5) + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        container.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }
    }

    function successBtns(showOrders) {
      return `
        <a href="index.html" class="flex items-center justify-center gap-3 w-full py-4 bg-gradient-to-r from-primary to-rose-700 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-primary/25 hover:opacity-90 transition-all active:scale-95">
          <i class="fas fa-home"></i> Về trang chủ
        </a>
        <div class="grid grid-cols-2 gap-3">
          <a href="book.html" class="flex items-center justify-center gap-2 py-4 bg-white border-2 border-gray-100 hover:border-primary hover:text-primary text-gray-600 rounded-2xl font-bold text-xs transition-all">
            <i class="fas fa-shopping-cart text-primary"></i> Mua sắm
          </a>
          ${showOrders ? `<a href="orders.html" class="flex items-center justify-center gap-2 py-4 bg-gray-900 hover:bg-black text-white rounded-2xl font-bold text-xs transition-all">
            <i class="fas fa-list"></i> Đơn hàng
          </a>` : `<a href="book.html" class="flex items-center justify-center gap-2 py-4 bg-gray-900 hover:bg-black text-white rounded-2xl font-bold text-xs transition-all">
            <i class="fas fa-book-open"></i> Sách mới
          </a>`}
        </div>`;
    }

    function errorBtns() {
      return `
        <a href="cart.html" class="flex items-center justify-center gap-3 w-full py-4 bg-gradient-to-r from-primary to-rose-700 text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-primary/25 hover:opacity-90 transition-all active:scale-95">
          <i class="fas fa-redo"></i> Thử lại
        </a>
        <a href="book.html" class="flex items-center justify-center gap-2 w-full py-4 bg-white border-2 border-gray-100 hover:border-primary hover:text-primary text-gray-600 rounded-2xl font-bold text-sm transition-all">
          <i class="fas fa-shopping-cart text-primary"></i> Tiếp tục mua sắm
        </a>`;
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const p = new URLSearchParams(window.location.search);
      const orderId      = p.get('orderId');
      const status       = p.get('status');
      const amount       = p.get('amount');
      const subtotal     = p.get('subtotal');
      const discount     = p.get('discount');
      const shipping     = p.get('shipping');
      const discountCode = p.get('discountCode');
      const freeShipCode = p.get('freeShipCode');
      const errorCode    = p.get('code');
      const paymentMethod= p.get('paymentMethod');
      const message      = p.get('message');

      const orderDetails = orderId ? await loadOrderDetails(orderId) : null;

      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('result-state').classList.remove('hidden');

      const icon     = document.getElementById('status-icon');
      const iconWrap = document.getElementById('status-icon-wrap');
      const title    = document.getElementById('status-title');
      const subtitle = document.getElementById('status-subtitle');
      const totalHL  = document.getElementById('total-highlight');
      const totalBig = document.getElementById('total-amount-big');
      const orderCard= document.getElementById('order-card');
      const orderRows= document.getElementById('order-rows');
      const customerCard= document.getElementById('customer-card');
      const customerRows= document.getElementById('customer-rows');
      const productCard = document.getElementById('product-card');
      const productList = document.getElementById('product-list');
      const priceCard   = document.getElementById('price-card');
      const priceRows   = document.getElementById('price-rows');
      const codCard     = document.getElementById('cod-card');
      const errCard     = document.getElementById('error-card');
      const errRows     = document.getElementById('error-rows');
      const actionDiv   = document.getElementById('action-btns');
      const actionDivMobile = document.getElementById('action-btns-mobile');

      const dateStr = orderDetails?.NgayTao
        ? new Date(orderDetails.NgayTao).toLocaleDateString('vi-VN')
        : new Date().toLocaleDateString('vi-VN');

      // Common logic for populating customer info & products
      function populateInfo() {
        if (orderDetails) {
          customerCard.classList.remove('hidden');
          const addr = [orderDetails.shippingAddress, orderDetails.ward, orderDetails.district, orderDetails.province]
            .filter(Boolean)
            .join(', ');

          // Defensive check for multiple field name variations
          const phone = orderDetails.recipientPhone || orderDetails.customerPhone || orderDetails.sdt || orderDetails.SDT || orderDetails.phone || (orderDetails.customer && (orderDetails.customer.phone || orderDetails.customer.sdt)) || '';
          const email = orderDetails.customerEmail || orderDetails.email || orderDetails.Email || (orderDetails.customer && orderDetails.customer.email) || '';
          const contact = [phone, email].filter(Boolean).join(' - ');

          customerRows.innerHTML = 
            row('Người nhận', orderDetails.recipientName || orderDetails.customerName || (orderDetails.customer && orderDetails.customer.name) || 'N/A') +
            row('Liên hệ', contact || 'N/A') +
            row('Địa chỉ', addr || 'N/A');

          // Try to resolve address codes if they look like numbers
          async function resolveAddress() {
            let updatedAddr = addr;
            try {
              if (orderDetails.province && !isNaN(orderDetails.province)) {
                const r = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/resolve/province/${orderDetails.province}`);
                if (r.ok) { const j = await r.json(); if (j.success) updatedAddr = updatedAddr.replace(orderDetails.province, j.data.name); }
              }
              if (orderDetails.district && !isNaN(orderDetails.district)) {
                const r = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/resolve/district/${orderDetails.district}`);
                if (r.ok) { const j = await r.json(); if (j.success) updatedAddr = updatedAddr.replace(orderDetails.district, j.data.name); }
              }
              if (orderDetails.ward && !isNaN(orderDetails.ward)) {
                const r = await fetch(`${window.API_CONFIG.BASE_URL}/api/orders/resolve/ward/${orderDetails.ward}`);
                if (r.ok) { const j = await r.json(); if (j.success) updatedAddr = updatedAddr.replace(orderDetails.ward, j.data.name); }
              }
              if (updatedAddr !== addr) {
                const addrVal = customerRows.querySelector('.detail-row:last-child .val');
                if (addrVal) addrVal.textContent = updatedAddr;
              }
            } catch(e) { console.warn('Address resolution failed', e); }
          }
          resolveAddress();
          
          if (orderDetails.items && orderDetails.items.length > 0) {
            productCard.classList.remove('hidden');
            productList.innerHTML = orderDetails.items.map(item => `
              <div class="flex items-center gap-4 p-4">
                <img src="${window.API_CONFIG.resolveImageUrl(item.productImage)}" alt="${item.productName}" class="w-12 h-16 object-cover rounded-md bg-gray-100 flex-shrink-0">
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-bold text-gray-800 truncate">${item.productName}</p>
                  <p class="text-xs text-gray-500">${formatPrice(item.price)} x ${item.quantity}</p>
                </div>
                <div class="text-right">
                  <p class="text-sm font-black text-primary">${formatPrice(item.price * item.quantity)}</p>
                </div>
              </div>
            `).join('');
          }
        }
      }

      // ---- COD / success ----
      if (status === 'cod' || (status === 'success' && paymentMethod === 'COD')) {
        const sub  = subtotal ? parseFloat(subtotal) : 0;
        const disc = discount ? parseFloat(discount) : 0;
        const ship = shipping ? parseFloat(shipping) : 0;
        const total= amount  ? parseFloat(amount)   : Math.max(0, sub - disc + ship);

        iconWrap.classList.add('text-emerald-500','bg-emerald-50');
        icon.className = 'fas fa-check-circle text-emerald-500 text-5xl';
        title.textContent = 'Đặt hàng thành công!';
        title.className   = 'text-2xl sm:text-3xl font-display font-black tracking-tight text-emerald-600';
        subtitle.textContent = 'Cảm ơn bạn đã tin tưởng Trung Phong Books 📚';

        totalHL.classList.remove('hidden');
        totalBig.textContent = formatPrice(total);

        orderCard.classList.remove('hidden');
        orderRows.innerHTML =
          row('Mã đơn hàng', `<span class="text-primary">#${orderId}</span>`) +
          row('Ngày đặt', dateStr) +
          row('Phương thức', 'COD (Thanh toán khi nhận hàng)') +
          row('Thanh toán', `<span class="inline-flex items-center gap-1 bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-clock text-[10px]"></i> Chưa thanh toán</span>`) +
          row('Trạng thái', `<span class="inline-flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-hourglass-half text-[10px]"></i> Chờ xử lý</span>`);

        priceCard.classList.remove('hidden');
        let pHTML = row('Tổng sản phẩm', formatPrice(sub));
        if (disc > 0) pHTML += row('Giảm giá', `<span class="text-emerald-600">-${formatPrice(disc)}</span>`);
        if (discountCode) pHTML += row('Mã giảm giá', `<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-xs font-black">${discountCode}</span>`);
        if (ship > 0) pHTML += row('Phí vận chuyển', formatPrice(ship));
        else if (freeShipCode) pHTML += row('Phí vận chuyển', `<span class="text-emerald-600 font-black">Miễn phí 🎉</span>`);
        if (freeShipCode) pHTML += row('Mã Free Ship', `<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full text-xs font-black">${freeShipCode}</span>`);
        pHTML += `<div class="detail-row bg-primary/5"><span class="lbl font-black text-gray-800 text-sm">TỔNG THANH TOÁN</span><span class="val text-primary text-lg font-black">${formatPrice(total)}</span></div>`;
        priceRows.innerHTML = pHTML;

        populateInfo();
        codCard.classList.remove('hidden');
        const btns = successBtns(isLoggedIn());
        actionDiv.innerHTML = btns;
        actionDivMobile.innerHTML = btns;
        spawnConfetti();
      }

      // ---- VNPay success ----
      else if (status === 'success' && (!paymentMethod || paymentMethod === 'VNPAY')) {
        const sub  = subtotal ? parseFloat(subtotal) : 0;
        const disc = discount ? parseFloat(discount) : 0;
        const ship = shipping ? parseFloat(shipping) : 0;
        const total= amount  ? parseFloat(amount)   : Math.max(0, sub - disc + ship);

        iconWrap.classList.add('text-blue-500','bg-blue-50');
        icon.className = 'fas fa-check-circle text-blue-500 text-5xl';
        title.textContent = 'Thanh toán VNPay thành công!';
        title.className   = 'text-2xl sm:text-3xl font-display font-black tracking-tight text-blue-600';
        subtitle.textContent = 'Đơn hàng đang được xử lý, chúng tôi sẽ liên hệ sớm!';

        totalHL.classList.remove('hidden');
        totalHL.className = 'bg-gradient-to-r from-blue-600 to-blue-800 rounded-[32px] p-8 text-white shadow-xl animate-fade-up';
        totalBig.textContent = formatPrice(total);

        orderCard.classList.remove('hidden');
        orderRows.innerHTML =
          row('Mã đơn hàng', `<span class="text-primary">#${orderId}</span>`) +
          row('Ngày đặt', dateStr) +
          row('Phương thức', 'VNPay') +
          row('Thanh toán', `<span class="inline-flex items-center gap-1 bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-check text-[10px]"></i> Đã thanh toán</span>`) +
          row('Trạng thái', `<span class="inline-flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-hourglass-half text-[10px]"></i> Chờ xử lý</span>`);

        priceCard.classList.remove('hidden');
        let pHTML = row('Tổng sản phẩm', formatPrice(sub));
        if (disc > 0) pHTML += row('Giảm giá', `<span class="text-emerald-600">-${formatPrice(disc)}</span>`);
        if (ship > 0) pHTML += row('Phí vận chuyển', formatPrice(ship));
        pHTML += `<div class="detail-row bg-primary/5"><span class="lbl font-black text-gray-800 text-sm">TỔNG THANH TOÁN</span><span class="val text-primary text-lg font-black">${formatPrice(total)}</span></div>`;
        priceRows.innerHTML = pHTML;

        populateInfo();
        const btns = successBtns(isLoggedIn());
        actionDiv.innerHTML = btns;
        actionDivMobile.innerHTML = btns;
        spawnConfetti();
      }

      // ---- failed / error ----
      else if (status === 'failed' || status === 'error') {
        iconWrap.classList.add('text-red-500','bg-red-50');
        icon.className = 'fas fa-times-circle text-red-500 text-5xl';
        title.textContent = status === 'failed' ? 'Thanh toán thất bại!' : 'Có lỗi xảy ra!';
        title.className   = 'text-2xl sm:text-3xl font-display font-black tracking-tight text-red-600';
        subtitle.textContent = message ? decodeURIComponent(message) : 'Đã xảy ra lỗi trong quá trình xử lý. Vui lòng thử lại!';

        errCard.classList.remove('hidden');
        errRows.innerHTML =
          row('Mã đơn hàng', orderId ? `#${orderId}` : 'N/A') +
          (errorCode ? row('Mã lỗi', errorCode) : '') +
          row('Lý do', message ? decodeURIComponent(message) : 'Lỗi không xác định');

        const btns = errorBtns();
        actionDiv.innerHTML = btns;
        actionDivMobile.innerHTML = btns;
      }

      // ---- invalid signature ----
      else if (status === 'invalid_signature') {
        iconWrap.classList.add('text-orange-500','bg-orange-50');
        icon.className = 'fas fa-shield-alt text-orange-500 text-5xl';
        title.textContent = 'Lỗi bảo mật!';
        title.className   = 'text-2xl sm:text-3xl font-display font-black tracking-tight text-orange-600';
        subtitle.textContent = 'Chữ ký VNPay không hợp lệ. Giao dịch có thể bị can thiệp.';
        const btns = errorBtns();
        actionDiv.innerHTML = btns;
        actionDivMobile.innerHTML = btns;
      }

      // ---- default ----
      else {
        iconWrap.classList.add('text-amber-500','bg-amber-50');
        icon.className = 'fas fa-question-circle text-amber-500 text-5xl';
        title.textContent = 'Trạng thái không xác định';
        title.className   = 'text-2xl sm:text-3xl font-display font-black tracking-tight text-amber-600';
        subtitle.textContent = 'Vui lòng liên hệ với chúng tôi để được hỗ trợ.';
        const btns = errorBtns();
        actionDiv.innerHTML = btns;
        actionDivMobile.innerHTML = btns;
      }
    });
  </script>
</body>
</html>
