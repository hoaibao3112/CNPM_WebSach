<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Sale</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Tailwind CSS CDN & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    
    <!-- API Configuration - LOAD EARLY -->
    <script src="js/config.js"></script>
    <script src="js/api-patcher.js"></script>
</head>

<body class="bg-bg pt-14 font-body antialiased">
    <div id="load-header"></div>

    <main class="container max-w-[1300px] mx-auto px-4 py-8 space-y-12">
        <!-- Flash Sale Banner -->
        <div class="flashsale-banner rounded-[2.5rem] overflow-hidden shadow-2xl border-4 border-white transform hover:scale-[1.01] transition-transform duration-700">
            <img src="img/anhnen1/anh1.jpg" alt="Flash Sale Banner" class="w-full h-auto">
        </div>

        <!-- Flash Sale Schedule -->
        <div class="flashsale-schedule bg-white rounded-3xl border border-border shadow-sm overflow-hidden">
            <div class="flashsale-header bg-gray-800 p-6 flex flex-col md:flex-row items-center justify-between gap-4 text-white">
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50">Kết thúc trong</span>
                    <span class="countdown text-2xl font-black tracking-tighter bg-white text-gray-800 px-4 py-1 rounded-xl shadow-inner" id="countdown">00 : 00 : 00</span>
                </div>
                <div class="current-session text-sm font-black uppercase tracking-widest bg-primary px-6 py-2 rounded-xl shadow-lg shadow-primary/20 animate-pulse" id="current-session">
                    12:00 ĐANG BÁN
                </div>
            </div>
            <div class="flashsale-times grid grid-cols-2 md:grid-cols-5 divide-x divide-gray-50 bg-gray-50/50">
                <div class="time-item p-4 text-center cursor-pointer transition-all hover:bg-white active [&.active]:bg-white [&.active]:shadow-inner">
                    <span class="text-lg font-black text-gray-800 block">12:00</span>
                    <small class="text-[9px] font-bold text-primary uppercase tracking-widest">ĐANG BÁN</small>
                </div>
                <div class="time-item p-4 text-center cursor-pointer transition-all hover:bg-white">
                    <span class="text-lg font-black text-gray-400 block">14:00</span>
                    <small class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">SẮP BÁN</small>
                </div>
                <div class="time-item p-4 text-center cursor-pointer transition-all hover:bg-white">
                    <span class="text-lg font-black text-gray-400 block">16:00</span>
                    <small class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">SẮP BÁN</small>
                </div>
                <div class="time-item p-4 text-center cursor-pointer transition-all hover:bg-white">
                    <span class="text-lg font-black text-gray-400 block">18:00</span>
                    <small class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">SẮP BÁN</small>
                </div>
                <div class="time-item p-4 text-center cursor-pointer transition-all hover:bg-white">
                    <span class="text-lg font-black text-gray-400 block">20:00</span>
                    <small class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">SẮP BÁN</small>
                </div>
            </div>
        </div>

        <!-- Flash Sale Section -->
        <section class="space-y-10">
            <div class="flashsale-title flex items-center gap-4 border-b border-border pb-4">
                <div class="w-10 h-10 bg-primary text-white rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 animate-bounce">
                    <i class="fas fa-bolt text-xs"></i>
                </div>
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">FLASH <span class="text-primary">SALE</span></h2>
            </div>
            
            <div id="multi-category-list" class="product-list grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Content loaded from API via giamgia1.js -->
            </div>
        </section>

        <!-- Recommend widget mount point -->
        <div id="recommend-widget-container" class="pt-20 border-t border-border"></div>
    </main>

    <div id="load-footer"></div>

    <script src="js/config.js"></script>
    <script src="js/api-patcher.js"></script>
    <script src="js/giamgia1.js"></script>
    <script src="js/loadHeader.js"></script>
    <script src="js/loadFooter.js"></script>
    <script src="js/recommend-widget.js"></script>

    <style>
        /* Shared Styles for JS-rendered products */
        .product-card {
            @apply bg-white rounded-3xl border border-border shadow-sm overflow-hidden transition-all duration-300 hover:shadow-xl hover:-translate-y-2 cursor-pointer;
        }
        .product-card img {
            @apply w-full aspect-[3/4] object-cover transition-transform duration-700;
        }
        .product-card:hover img {
            @apply scale-110;
        }
        .card-body {
            @apply p-4 space-y-2;
        }
        .card-body h3 {
            @apply text-sm font-black text-gray-800 uppercase tracking-tighter line-clamp-2 leading-tight;
        }
        .product-author {
            @apply text-[10px] font-bold text-gray-400 uppercase tracking-widest truncate;
        }
        .product-price {
            @apply text-base font-black text-primary tracking-tighter;
        }
    </style>
</body>
</html>
