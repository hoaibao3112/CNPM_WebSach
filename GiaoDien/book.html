<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang sách</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Tailwind CSS CDN & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    
    <!-- API Configuration - LOAD EARLY -->
    <script src="js/config.js"></script>
    <script src="js/api-patcher.js"></script>

    <style>
        :root {
            --primary: #B03A2E;
            --primary-dark: #8E2920;
            --bg: #f7f3f0;
            --text: #2c2c2c;
            --text-light: #888888;
            --border: #ede8e3;
        }

        /* Modern Filter Styles */
        .filter-btn {
            font-size: 10px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 12px;
            background: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(176, 58, 46, 0.08);
        }
        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 8px 16px rgba(176, 58, 46, 0.2);
        }

        /* Active Filter Bar & Chips */
        .active-filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            background: #fff;
            border-radius: 20px;
            border: 1px solid #eee;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            flex-wrap: wrap;
        }
        @media (max-width: 640px) {
            .active-filter-bar {
                padding: 10px 12px;
                gap: 8px;
                border-radius: 16px;
            }
            .filter-chips {
                width: 100%;
            }
            .clear-filters-btn {
                width: 100%;
                justify-content: center;
                background: #f8fafc;
                margin-top: 4px;
            }
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .filter-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            transition: all 0.2s;
        }
        .filter-chip:hover {
            background: #fff;
            box-shadow: 0 4px 12px rgba(176, 58, 46, 0.1);
        }
        .chip-label {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chip-remove {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chip-remove:hover {
            transform: rotate(90deg);
        }
        .clear-filters-btn {
            display: inline-flex;
            align-items: center;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .clear-filters-btn:hover {
            color: var(--primary);
            background: #fff5f5;
            border-color: #fed7d7;
        }

        /* Dropdown enhancements */
        .dropdown-active .dropdown-content {
            display: block !important;
        }
        .dropdown-active .dropdown-header i {
            transform: rotate(180deg);
        }
        .dropdown-item {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dropdown-item:hover {
            background: #f8fafc;
            color: var(--primary);
            padding-left: 20px;
        }
        .dropdown-item.active {
            background: #fff5f5;
            color: var(--primary);
            font-weight: 800;
        }
    </style>
</head>

<body class="books-page bg-bg pt-14 font-body antialiased">
    <!-- header -->
    <div id="load-header"></div>

    <div class="container max-w-[1300px] mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 relative">
        <!-- Mobile Filter Toggle -->
        <div class="lg:hidden sticky top-[4.5rem] z-40 mb-4">
            <button onclick="toggleMobileSidebar()" class="w-full h-12 bg-white border border-border shadow-md rounded-2xl flex items-center justify-center gap-3 text-sm font-black uppercase tracking-widest text-primary hover:bg-gray-50 active:scale-95 transition-all">
                <i class="fas fa-filter"></i>
                Lọc & Phân loại
            </button>
        </div>

        <!-- Sidebar Overlay (Mobile Only) -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-[10002] hidden lg:hidden backdrop-blur-sm" onclick="toggleMobileSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 w-[300px] bg-bg z-[10003] transform -translate-x-full lg:translate-x-0 lg:static lg:w-[280px] lg:z-0 lg:bg-transparent transition-transform duration-300 ease-in-out flex-shrink-0 space-y-6 overflow-y-auto lg:overflow-visible p-6 lg:p-0">
            <!-- Mobile Sidebar Header -->
            <div class="lg:hidden flex items-center justify-between mb-8 border-b border-border pb-4">
                <h2 class="text-lg font-black text-text uppercase tracking-widest">Bộ lọc</h2>
                <button onclick="toggleMobileSidebar()" class="w-10 h-10 rounded-full bg-white border border-border flex items-center justify-center text-text-light hover:text-primary">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Category Filter -->
            <div class="filter-card bg-white p-6 rounded-[2rem] border border-border shadow-sm hover:shadow-md transition-shadow">
                <h3 class="text-xs font-black text-text-light uppercase tracking-[0.2em] mb-5 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                        <i class="fas fa-list-ul text-xs"></i>
                    </div>
                    Danh mục
                </h3>
                <div class="category-dropdown relative" id="categoryDropdown">
                    <div class="dropdown-header flex justify-between items-center p-4 bg-gray-50 rounded-2xl cursor-pointer hover:bg-gray-100 transition-all border border-transparent hover:border-border group" onclick="toggleDropdown()">
                        <span class="text-sm font-bold text-text group-hover:text-primary transition-colors">Nổi bật</span>
                        <i class="fas fa-chevron-down text-[10px] text-text-light transition-transform duration-300"></i>
                    </div>
                    <div class="dropdown-content absolute top-full left-0 right-0 mt-2 bg-white shadow-2xl rounded-2xl border border-border overflow-hidden hidden z-30 animate-in fade-in slide-in-from-top-2 duration-200" id="category-content">
                        <!-- JS renders categories here -->
                    </div>
                </div>
            </div>

            <!-- Price Filter -->
            <div class="filter-card bg-white p-6 rounded-[2rem] border border-border shadow-sm hover:shadow-md transition-shadow">
                <h3 class="text-xs font-black text-text-light uppercase tracking-[0.2em] mb-5 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-green-50 flex items-center justify-center text-green-600">
                        <i class="fas fa-tags text-xs"></i>
                    </div>
                    Lọc theo giá
                </h3>
                <div class="price-buttons flex flex-wrap gap-2" id="priceButtons">
                    <button class="filter-btn active" data-value="">Tất cả</button>
                    <button class="filter-btn" data-value="0-50000">Dưới 50k</button>
                    <button class="filter-btn" data-value="50000-100000">50k - 100k</button>
                    <button class="filter-btn" data-value="100000-200000">100k - 200k</button>
                    <button class="filter-btn" data-value="200000">Trên 200k</button>
                </div>
            </div>

            <!-- Supplier Filter -->
            <div class="filter-card bg-white p-6 rounded-[2rem] border border-border shadow-sm hover:shadow-md transition-shadow">
                <h3 class="text-xs font-black text-text-light uppercase tracking-[0.2em] mb-5 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600">
                        <i class="fas fa-building text-xs"></i>
                    </div>
                    Nhà cung cấp
                </h3>
                <div class="supplier-buttons flex flex-wrap gap-2" id="supplierButtons">
                    <button class="filter-btn active" data-value="">Tất cả</button>
                </div>
            </div>

            <!-- Author Filter -->
            <div class="filter-card bg-white p-6 rounded-[2rem] border border-border shadow-sm hover:shadow-md transition-shadow">
                <h3 class="text-xs font-black text-text-light uppercase tracking-[0.2em] mb-5 flex items-center gap-3">
                    <div class="w-8 h-8 rounded-xl bg-orange-50 flex items-center justify-center text-orange-600">
                        <i class="fas fa-pen-nib text-xs"></i>
                    </div>
                    Tác giả
                </h3>
                <div class="author-buttons flex flex-wrap gap-2" id="authorButtons">
                    <button class="filter-btn active" data-value="">Tất cả</button>
                </div>
                <button id="authorToggleBtn" class="view-more-btn mt-4 w-full text-[10px] font-black uppercase tracking-widest text-primary py-3 border border-primary/20 rounded-xl hover:bg-primary/5 transition-all hidden">Xem thêm</button>
            </div>

            <!-- Deal Hot Section -->
            <div class="bg-gradient-to-br from-primary via-primary to-primary-dark p-6 rounded-[2.5rem] shadow-xl shadow-primary/20 text-white relative overflow-hidden group">
                <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full group-hover:scale-125 transition-transform duration-700"></div>
                <div class="relative z-10">
                    <h4 class="text-xs font-black uppercase tracking-[0.2em] mb-5 flex items-center gap-3">
                        <i class="fas fa-fire animate-pulse text-yellow-400"></i> DEAL HOT GIẢM SỐC
                    </h4>
                    <div class="discount-filter mb-5" id="discountButtons">
                        <button class="text-[10px] font-black uppercase tracking-widest bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl transition-all" data-id="">Tất cả deal</button>
                    </div>
                    <ul id="promotions-list" class="space-y-3 mb-6"></ul>
                    <div id="deal-hot-list" class="space-y-4"></div>
                    <a href="#" class="inline-flex items-center gap-3 text-[10px] font-black uppercase tracking-widest hover:gap-5 transition-all mt-4 border-b border-white/30 pb-1">
                        Xem thêm deal hot <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>

            <!-- Support Box -->
            <div class="p-6 text-center bg-gray-50 rounded-[2rem] border border-border shadow-inner group">
                <p class="text-[10px] font-black text-text-light mb-2 uppercase tracking-widest opacity-60">Hỗ trợ đặt hàng</p>
                <div class="hotline text-xl font-black text-primary tracking-tight group-hover:scale-110 transition-transform">0374 170 367</div>
            </div>
            </div>
        </aside>


        <!-- Main Content -->
        <main class="main-content flex-1">
            <div class="product-section bg-white p-6 rounded-lg border border-border shadow-sm min-h-[600px]">
                <div class="flex items-center justify-between mb-8 border-b border-border pb-4">
                    <h2 id="name-products-list" class="font-display text-2xl font-extrabold text-gray-800">
                        Danh sách sản phẩm
                    </h2>
                    <div class="text-xs text-gray-400 font-medium">Sắp xếp theo: <span class="text-primary cursor-pointer hover:underline">Mặc định</span></div>
                </div>
                <div id="search-book-list" class="product-container grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- Products rendered by JS -->
                </div>
            </div>
        </main>
    </div>

<script src="js/customerActivity.js"></script>
    <script src="js/loadHeader.js"></script>
    <script src="js/book.js"></script>
    <script>
        // Hàm toggle dropdown cho sidebar
        function toggleDropdown() {
            const dropdown = document.getElementById('categoryDropdown');
            dropdown.classList.toggle('dropdown-active');
        }

        // Hàm toggle sidebar cho mobile
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const body = document.body;
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                body.style.overflow = 'hidden';
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                body.style.overflow = '';
            }
        }

        // Đóng dropdown khi click ra ngoài
        document.addEventListener('click', function (event) {
            const dropdown = document.getElementById('categoryDropdown');
            if (dropdown && !dropdown.contains(event.target)) {
                dropdown.classList.remove('dropdown-active');
            }
        });

        // Hàm filter sản phẩm
    </script>
  
    <!-- Footer placeholder -->
    <div id="load-footer"></div>
    <script src="js/loadFooter.js"></script>
</body>

</html>
